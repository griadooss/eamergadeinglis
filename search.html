<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Search &mdash; Eamer | Gade | Inglis Family History</title>
<style>
  :root{ --bg:#e9e2d0; --ink:#2b2119; --brown:#3a2b20; --tan:#a08a6f; --link:#5a3d29; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;color:var(--ink);
       background:var(--bg);}
  header{background:var(--brown);color:#efe7d8;padding:18px 22px;}
  header .title{font-size:1.6rem;letter-spacing:1px}
  header .sub{color:#c9b79c;font-size:.9rem;margin-top:2px}
  header a{color:#e7d9c2;text-decoration:none;border-bottom:1px dotted #b39d80}
  .wrap{max-width:820px;margin:0 auto;padding:22px}
  #q{width:100%;padding:14px 16px;font-size:1.15rem;font-family:inherit;
     border:2px solid var(--tan);border-radius:8px;background:#fbf8f0;color:var(--ink)}
  #q:focus{outline:none;border-color:var(--brown)}
  #count{margin:14px 2px;color:#6b5a48;font-size:.95rem}
  ul{list-style:none;margin:0;padding:0}
  li{padding:10px 12px;border-bottom:1px solid #d6cab2}
  li:nth-child(odd){background:#efe8d8}
  li a{color:var(--link);text-decoration:none;font-weight:bold;font-size:1.08rem}
  li a:hover{text-decoration:underline}
  .yrs{color:#5a4a3a}
  .pl{color:#7a6a58;font-style:italic;font-size:.92rem;display:block;margin-top:2px}
  .hint{color:#8a7963;font-size:.9rem;margin-top:6px}
  footer{max-width:820px;margin:20px auto;padding:0 22px 30px;color:#8a7963;font-size:.85rem}
</style>
</head>
<body>
<header>
  <div class="title">E<span style="font-size:.8em">AMER</span> | G<span style="font-size:.8em">ADE</span> | I<span style="font-size:.8em">NGLIS</span></div>
  <div class="sub"><a href="index.html">&#8962; Home</a> &nbsp;&middot;&nbsp; Search our family history</div>
</header>
<div class="wrap">
  <input id="q" type="search" autocomplete="off" placeholder="Search by name, place or year&hellip;  e.g.  Willows   or   Quorn   or   1825">
  <div class="hint">Type any part of a name, a place, or a year. Living people are not listed.</div>
  <div id="count"></div>
  <ul id="results"></ul>
</div>
<footer>Searching <span id="total">0</span> individuals &middot; Eamer&nbsp;|&nbsp;Gade&nbsp;|&nbsp;Inglis family history.</footer>

<script src="search-index.js"></script>
<script>
(function(){
  var DATA = window.TNG_INDEX || [];
  var LIMIT = 300;
  var q = document.getElementById('q');
  var out = document.getElementById('results');
  var count = document.getElementById('count');
  document.getElementById('total').textContent = DATA.length;

  // pre-compute a lowercase haystack per record
  DATA.forEach(function(r){
    r._h = ((r.n||'')+' '+(r.b||'')+' '+(r.d||'')+' '+(r.p||'')).toLowerCase();
  });

  function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

  function render(list, truncated){
    if(!list.length){ out.innerHTML=''; return; }
    var h = list.map(function(r){
      var yrs = (r.b||r.d) ? ' <span class="yrs">('+esc(r.b||'?')+'&ndash;'+esc(r.d||'')+')</span>' : '';
      var pl  = r.p ? '<span class="pl">'+esc(r.p)+'</span>' : '';
      return '<li><a href="person_'+esc(r.i)+'.html">'+esc(r.n)+'</a>'+yrs+pl+'</li>';
    }).join('');
    out.innerHTML = h;
  }

  function search(){
    var terms = q.value.toLowerCase().split(/\s+/).filter(Boolean);
    if(!terms.length){ count.textContent=''; out.innerHTML=''; return; }
    var res=[];
    for(var i=0;i<DATA.length;i++){
      var ok=true, h=DATA[i]._h;
      for(var t=0;t<terms.length;t++){ if(h.indexOf(terms[t])<0){ok=false;break;} }
      if(ok) res.push(DATA[i]);
    }
    res.sort(function(a,b){ return (a.n||'').localeCompare(b.n||''); });
    var trunc = res.length>LIMIT;
    count.textContent = res.length + (res.length===1?' match':' matches') + (trunc?' (showing first '+LIMIT+')':'');
    render(trunc?res.slice(0,LIMIT):res);
  }

  // field-scoped modes used by the browse lists, so a click matches only the
  // field it came from (a surname link can't leak into places or other names).
  function filtered(match, labelSingular, labelPlural, term){
    var res=[];
    for(var i=0;i<DATA.length;i++){ if(match(DATA[i])) res.push(DATA[i]); }
    res.sort(function(a,b){ return (a.n||'').localeCompare(b.n||''); });
    var trunc = res.length>LIMIT;
    count.textContent = res.length + ' ' + (res.length===1?labelSingular:labelPlural) + ' “'+term+'”'
                      + (trunc?' (showing first '+LIMIT+')':'');
    render(trunc?res.slice(0,LIMIT):res);
  }
  // place mode: match ONLY the place field (so clicking "UK" can't pull in "Duke").
  function placeSearch(pl){
    var n=pl.toLowerCase();
    filtered(function(r){return (r.p||'').toLowerCase().indexOf(n)>=0;},
             'person recorded at','people recorded at', pl);
  }
  // surname mode: EXACT last-name match (so "WHITE" excludes "White Hills" and "Whitehead").
  function surnameSearch(sn){
    var n=sn.toLowerCase();
    filtered(function(r){return (r.l||'').toLowerCase()===n;},
             'person with the surname','people with the surname', sn);
  }
  // given-name mode: whole-word match within the given name(s), so "Lucy"
  // finds "Ada Lucy" and "Lucy Christina" but "Ann" does not pull in "Anna".
  function givenSearch(gn){
    var n=gn.toLowerCase();
    filtered(function(r){return (' '+(r.g||'').toLowerCase()+' ').indexOf(' '+n+' ')>=0;},
             'person with the given name','people with the given name', gn);
  }

  q.addEventListener('input', search);
  // support values passed from the site's links (?q= / ?place=) or the header box (myfirstname/mylastname)
  try{
    var p = new URLSearchParams(location.search);
    // jump straight to a person if an exact ID was supplied
    var pid = p.get('mypersonid');
    if(pid){ location.replace('person_'+pid.replace(/[^A-Za-z0-9]/g,'')+'.html'); return; }
    // field-scoped clicks from the browse lists
    var plv = p.get('place');
    if(plv){ q.value = plv; placeSearch(plv); q.focus(); return; }
    var snv = p.get('surname');
    if(snv){ q.value = snv; surnameSearch(snv); q.focus(); return; }
    var gnv = p.get('given');
    if(gnv){ q.value = gnv; givenSearch(gnv); q.focus(); return; }
    var qv = p.get('q');
    if(!qv){ qv = ((p.get('myfirstname')||'')+' '+(p.get('mylastname')||'')).trim(); }
    if(qv){ q.value = qv; }
  }catch(e){}
  q.focus(); search();
})();
</script>
</body>
</html>
